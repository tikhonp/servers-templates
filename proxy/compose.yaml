services:
  mtproto:
    image: telegrammessenger/proxy:latest
    container_name: "mtproto-${CONTAINER_POSTFIX}"
    restart: unless-stopped
    volumes:
      - "mtproto:/data"
    env_file: .env
    environment:
      - SECRET=$MTPROTO_SECRET
    ports:
      - "$MTPROTO_PORT:443"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: "xray-${CONTAINER_POSTFIX}"
    restart: unless-stopped
    volumes:
      - "./xray-config.json:/usr/local/etc/xray/config.json:ro"
    env_file: .env
    ports:
      - "$SERVER_IP:$VLESS_PORT:10237/tcp"
    expose:
      - "$VLESS_PORT"
    networks:
      xraynet:
        ipv4_address: ${XRAY_IP}
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  socks5:
    image: serjs/go-socks5-proxy
    container_name: "socks5-${CONTAINER_POSTFIX}"
    restart: unless-stopped
    env_file: .env
    environment:
      - REQUIRE_AUTH=true
      - PROXY_USER=$SOCKS5_USERNAME
      - PROXY_PASSWORD=$SOCKS5_PASSWORD
      - PROXY_PORT=1080
    ports:
      - "$SOCKS5_PORT:1080"

volumes:
  mtproto:

networks:
  xraynet:
    ipam:
      driver: default
      config:
        - subnet: "${XRAY_SUBNET}"
