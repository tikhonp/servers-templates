services:
  mtproto:
    image: telegrammessenger/proxy:latest
    container_name: "mtproto-${CONTAINER_POSTFIX}"
    restart: unless-stopped
    volumes:
      - "mtproto:/data"
    env_file: .env
    environment:
      - SECRET=$MTPROTO_SECRET
    ports:
      - "$MTPROTO_PORT:443"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: "xray-${CONTAINER_POSTFIX}"
    restart: unless-stopped
    volumes:
      - "./xray-config.json:/usr/local/etc/xray/config.json:ro"
    env_file: .env
    ports:
      - "$SERVER_IP:$VLESS_PORT:$VLESS_PORT/tcp"
    expose:
      - "$VLESS_PORT"
    networks:
      xraynet:
        ipv4_address: ${XRAY_IP}
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  socks5:
    image: ghcr.io/tarampampam/3proxy:latest
    container_name: "proxy-${CONTAINER_POSTFIX}"
    restart: unless-stopped
    env_file: .env
    environment:
      - PROXY_LOGIN=$PROXY_USERNAME
      - PROXY_PASSWORD=$PROXY_PASSWORD
      - PROXY_PORT=3128
      - SOCKS_PORT=1080
    ports:
      - "$PROXY_SOCKS5_PORT:1080/tcp"
      - "$PROXY_HTTP_PORT:1080/tcp"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  mtproto:

networks:
  xraynet:
    ipam:
      driver: default
      config:
        - subnet: "${XRAY_SUBNET}"
